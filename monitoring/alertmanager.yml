# ============================================
# Saraya ERP - Alertmanager Configuration
# ============================================

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - matchers:
        - severity="critical"
      receiver: 'critical'
    - matchers:
        - severity="warning"
      receiver: 'default'

receivers:
  - name: 'default'
    # يمكن إضافة webhook أو email لاحقاً

  - name: 'critical'
    # يمكن إضافة webhook أو email لاحقاً

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname']
