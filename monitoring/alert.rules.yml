# ============================================
# Saraya ERP - Prometheus Alert Rules
# ============================================

groups:
  - name: saraya-system
    rules:
      # السيرفر غير متاح
      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "السيرفر لا يستجيب"
          description: "Node exporter is down for more than 1 minute"

      # استخدام عالي للمعالج
      - alert: HighCpuUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "استخدام المعالج فوق 85%"
          description: "CPU usage is above 85% for 5 minutes"

      # استخدام عالي للذاكرة
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "استخدام الذاكرة فوق 90%"
          description: "Memory usage is above 90% for 5 minutes"

      # القرص ممتلئ
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "مساحة القرص منخفضة (أكثر من 85%)"
          description: "Disk usage on / is above 85%"

  - name: saraya-services
    rules:
      # التطبيق لا يعمل
      - alert: BackendDown
        expr: up{job="saraya-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "الخادم الخلفي لا يستجيب"
          description: "Saraya backend is not responding"

      # قاعدة البيانات لا تعمل
      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "قاعدة البيانات لا تستجيب"
          description: "PostgreSQL is not responding"

      # Redis لا يعمل
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis لا يستجيب"
          description: "Redis is not responding"

      # اتصالات قاعدة البيانات عالية
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count{datname="saraya_erp"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "عدد اتصالات قاعدة البيانات مرتفع"
          description: "PostgreSQL connections above 80"
