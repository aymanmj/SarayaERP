# version: '3.8'

services:
  # ==========================================
  # 1. طبقة البيانات (Data Layer)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: saraya_db
    restart: always
    shm_size: 1g # تحسين الأداء: زيادة الذاكرة المشتركة
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-saraya_erp}
      TZ: Africa/Tripoli
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saraya_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-saraya_erp}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: &default_logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: saraya_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - saraya_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default_logging

  # ==========================================
  # 2. طبقة التطبيق (Application Layer)
  # ==========================================
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-aymanmj}/saraya-backend:${IMAGE_TAG:-latest}
    container_name: saraya_backend
    restart: always
    user: "node" # تشغيل بمستخدم غير الروت للأمان
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-saraya_erp}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400s}
      OTLP_ENDPOINT: "http://saraya_otel_collector:4318/v1/traces"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_TOKEN:-saraya-root-token-dev}
      NODE_ENV: production
      PORT: 3000
      TZ: Africa/Tripoli
      LICENSE_PATH: /app/data/license/saraya.lic
      # 🔒 Security: تحديد المصادر المسموحة (CORS)
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # 🔒 Security: مفتاح تشفير بيانات المرضى (AES-256)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-saraya-default-salt-123}
      # إعدادات البريد (تأكد من وجودها في .env)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # إعدادات تيليجرام (بوابة المريض)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_URL: ${TELEGRAM_BOT_URL:-https://t.me/SarayaMedBot}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./data/license:/app/data/license
      # Bind mount so host can chown for user node (named volumes are often root-only)
      - ./data/keys:/app/data/keys
      - ${BACKUP_PATH:-./backups}:/backups
      - /mnt:/mnt:rw,rslave      # الأقراص الخارجية (تظهر تلقائياً بدون إعادة تشغيل)
      - /media:/media:rw,rslave   # أقراص USB (تظهر تلقائياً بدون إعادة تشغيل)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - saraya_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default_logging

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-aymanmj}/saraya-frontend:${IMAGE_TAG:-latest}
    container_name: saraya_frontend
    restart: always
    environment:
      VITE_API_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - saraya_net
    logging: *default_logging

  # ==========================================
  # 3. الوصول والشبكة (Access Layer)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: saraya_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./production/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - saraya_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/api/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default_logging

  # بوابة المطورين والمستشفيات للـ FHIR
  kong:
    image: kong:3.6-ubuntu
    container_name: saraya_kong
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/etc/kong/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      # لا نفتح الـ Admin API لشبكة الإنترنت الخارجي لأسباب أمنية
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
    ports:
      - "8000:8000"   # Proxy (Developer access)
      - "8443:8443"   # Proxy SSL
    volumes:
      - ./production/kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - saraya_net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 3
    logging: *default_logging

  # 🔒 Cloudflare Tunnel (Access from Internet without opening ports)
  # كل عميل يحتاج Tunnel Token خاص به مرتبط بـ Subdomain فريد
  # مثال: rehab.alsarayatech.ly, nokhba.alsarayatech.ly
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: saraya_tunnel
    restart: always
    command: tunnel run --protocol http2
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - saraya_net
    logging: *default_logging

  # 🌐 Tailscale (Secure VPN access)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: saraya_tailscale
    hostname: ${TAILSCALE_HOSTNAME:-saraya-erp}
    restart: always
    network_mode: host
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--reset
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    logging: *default_logging

  # ==========================================
  # 4. الخدمات المساندة (Support Services)
  # ==========================================

  # خدمة النسخ الاحتياطي
  backup:
    image: postgres:15-alpine
    container_name: saraya_backup
    restart: always
    user: root # يحتاج روت لتنصيب curl وضبط المجلدات
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
      - ./scripts:/opt/saraya-erp/scripts:ro
      - /mnt:/mnt:rw,rslave      # الأقراص الخارجية (تظهر تلقائياً)
      - /media:/media:rw,rslave   # أقراص USB (تظهر تلقائياً)
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-saraya_erp}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      TZ: Africa/Tripoli
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl jq
        echo "⏳ Backup worker started..."
        /opt/saraya-erp/scripts/backup-worker.sh
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saraya_net

  vault:
    image: hashicorp/vault:1.15
    container_name: saraya_vault
    restart: always
    environment:
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}}, "listener": {"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}, "ui": true, "disable_mlock": true}'
      VAULT_API_ADDR: "http://127.0.0.1:8200"
    command: server
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - vault_data_v2:/vault/file
    networks:
      - saraya_net
    cap_add:
      - IPC_LOCK
    logging: *default_logging

  # ==========================================
  # 5. المراقبة (Monitoring Stack)
  # ==========================================

  # مجمع مقاييس السيرفر (CPU, RAM, Disk)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: saraya_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - saraya_net

  # مجمع مقاييس قاعدة البيانات
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: saraya_postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-saraya_erp}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saraya_net

  # مجمع مقاييس Redis
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: saraya_redis_exporter
    restart: always
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - saraya_net

  # Prometheus - تجميع البيانات
  prometheus:
    image: prom/prometheus:latest
    container_name: saraya_prometheus
    restart: always
    volumes:
      - ./monitoring:/etc/prometheus_config:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus_config/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"
    networks:
      - saraya_net

  # Grafana - لوحة العرض
  grafana:
    image: grafana/grafana:latest
    container_name: saraya_grafana
    user: root
    restart: always
    ports:
      - "3001:3000" # يمكن الوصول لـ Grafana عبر المنفذ 3001
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - saraya_net

  # Alertmanager - إدارة التنبيهات
  alertmanager:
    image: prom/alertmanager:latest
    container_name: saraya_alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring:/etc/alertmanager_config:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager_config/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - saraya_net

  # Loki - Centralized Logging
  loki:
    image: grafana/loki:latest
    container_name: saraya_loki
    restart: always
    user: "0:0"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring:/etc/loki_config:ro
      - loki_data:/loki
    command: -config.file=/etc/loki_config/loki-config.yml
    networks:
      - saraya_net

  # Promtail - Log Shipping from Docker
  promtail:
    image: grafana/promtail:latest
    container_name: saraya_promtail
    restart: always
    user: "0:0"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring:/etc/promtail_config:ro
    command: -config.file=/etc/promtail_config/promtail-config.yml
    networks:
      - saraya_net
    depends_on:
      - loki

  # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:latest
    container_name: saraya_tempo
    restart: always
    user: "0:0"
    command: -config.file=/etc/tempo_config/tempo-config.yml
    ports:
      - "3200:3200"   # Tempo Server
    volumes:
      - ./monitoring:/etc/tempo_config:ro
      - tempo_data:/var/tempo
    networks:
      - saraya_net

  # OpenTelemetry Collector - unified receiver
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: saraya_otel_collector
    restart: always
    user: "0:0"
    command: ["--config=/etc/otel_config/otel-collector-config.yml"]
    volumes:
      - ./monitoring:/etc/otel_config:ro
    ports:
      - "4317:4317"  # OTLP gRPC (Receiver)
      - "4318:4318"  # OTLP HTTP (Receiver)
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      - tempo
      - prometheus
    networks:
      - saraya_net


  # ==========================================
  # 6. أدوات الإدارة عن بعد
  # ==========================================

  watchtower:
    image: containrrr/watchtower:latest
    container_name: saraya_watchtower
    restart: always
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.44 # Fix old client error
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup
    networks:
      - saraya_net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: saraya_portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - saraya_net

# ==========================================
# وحدات التخزين والشبكات
# ==========================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  portainer_data:
  alertmanager_data:
  tailscale_data:
  vault_data_v2:
  loki_data:
  tempo_data:

networks:
  saraya_net:
    driver: bridge
